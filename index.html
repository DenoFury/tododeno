<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Modern Tasks & Notebooks</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">CRM Agency</div>
        <nav class="sidebar-nav">
            <ul>
                <li id="nav-board" class="active">My Tasks</li>
                <li id="nav-calendar">Calendar</li>
                <li id="nav-notebooks">Notes & Ideas</li>
                <li>Settings</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        
        <section id="view-board" class="view-section active">
            <header class="app-header">
                <h1>My Tasks</h1>
                <button id="btnShowTaskModal">+ New Task</button>
            </header>
            <div class="task-list-container" id="taskListContainer"></div>
        </section>

        <section id="view-calendar" class="view-section">
            <header class="app-header">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <h1 id="calendarMonthYear">Month Year</h1>
                    <div class="calendar-nav-buttons">
                        <button class="btn-cancel" id="btnPrevMonth">&lt;</button>
                        <button class="btn-cancel" id="btnNextMonth">&gt;</button>
                        <button class="btn-cancel" id="btnToday">Today</button>
                    </div>
                </div>
                <button id="btnCreateEvent">+ New Event</button>
            </header>
            
            <div class="calendar-wrapper">
                <div class="calendar-header-row">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>
        </section>

        <section id="view-notebooks-list" class="view-section">
            <header class="app-header"><h1>My Notebooks</h1></header>
            <div class="notebook-grid" id="notebookGrid">
                </div>
        </section>

        <section id="view-whiteboard" class="view-section">
            <header class="app-header">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <button id="btnBackToNotebooks" class="btn-cancel" style="padding: 0.5rem 1rem; border-radius: 10px;">&larr; Back</button>
                    <h1 id="activeNotebookTitle">Notebook Name</h1>
                </div>
            </header>
            
            <div class="whiteboard-container">
                <div class="toolbar">
                    <div class="tool-group">
                        <button id="btnPen" class="btn-tool active">Pen</button>
                        <button id="btnEraser" class="btn-tool">Eraser</button>
                        <input type="color" id="colorPicker" class="color-picker" value="#1d1d1f" title="Brush Color">
                    </div>
                    
                    <div class="tool-group page-controls">
                        <button id="btnPrevPage" class="btn-tool">&lt;</button>
                        <span id="pageIndicator" style="font-weight: 600; font-size: 0.9rem; min-width: 40px; text-align: center;">1/1</span>
                        <button id="btnNextPage" class="btn-tool">&gt;</button>
                        <button id="btnAddPage" class="btn-tool" style="color: var(--primary-color);">+ Add Page</button>
                    </div>

                    <div class="tool-group" style="margin-left: auto;">
                        <button id="btnSavePdf" style="padding: 0.5rem 1rem; border-radius: 10px;">Export PDF</button>
                    </div>
                </div>
                
                <div id="canvasWrapper" class="canvas-wrapper bg-lined paper-white">
                    <canvas id="drawCanvas" width="800" height="600"></canvas>
                </div>
            </div>
        </section>

    </main>

    <div class="modal-overlay" id="createTaskModal">
        <div class="modal-content">
            <div class="modal-header" id="taskModalHeader">New Task</div>
            <div class="form-group"><label>Title</label><input type="text" id="newTaskTitle" autocomplete="off"></div>
            <div class="form-group toggle-group">
                <label style="margin: 0; cursor: pointer;" for="isEventToggle">Schedule in Calendar</label>
                <label class="switch"><input type="checkbox" id="isEventToggle"><span class="slider round"></span></label>
            </div>
            <div class="form-group-row" id="dateTimeInputs">
                <div class="form-group" style="flex: 1; margin-bottom: 0;"><label>Date</label><input type="date" id="newTaskDate"></div>
                <div class="form-group" style="flex: 1; margin-bottom: 0;"><label>Time (Optional)</label><input type="time" id="newTaskTime"></div>
            </div>
            <div class="form-group"><label>Description (Optional)</label><textarea id="newTaskDesc"></textarea></div>
            <div class="form-group">
                <label>Color Tag</label>
                <div class="color-options" id="taskColorOptions">
                    <div class="color-swatch selected" data-color="var(--color-red)" style="background-color: var(--color-red);"></div>
                    <div class="color-swatch" data-color="var(--color-orange)" style="background-color: var(--color-orange);"></div>
                    <div class="color-swatch" data-color="var(--color-yellow)" style="background-color: var(--color-yellow);"></div>
                    <div class="color-swatch" data-color="var(--color-green)" style="background-color: var(--color-green);"></div>
                    <div class="color-swatch" data-color="var(--color-blue)" style="background-color: var(--color-blue);"></div>
                    <div class="color-swatch" data-color="var(--color-purple)" style="background-color: var(--color-purple);"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelTask">Cancel</button>
                <button id="btnConfirmTask">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="createNotebookModal">
        <div class="modal-content">
            <div class="modal-header">Create New Notebook</div>
            <div class="form-group">
                <label>Notebook Name</label>
                <input type="text" id="newNotebookName" placeholder="e.g., Q3 Marketing Ideas" autocomplete="off">
            </div>
            <div class="form-group-row active">
                <div class="form-group" style="flex: 1;">
                    <label>Paper Style</label>
                    <select id="newNotebookPaper">
                        <option value="blank">Blank Paper</option>
                        <option value="lined">Lined Paper</option>
                        <option value="squared">Squared / Grid</option>
                        <option value="dotted">Dotted</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Background Color</label>
                    <select id="newNotebookColor">
                        <option value="paper-white">White</option>
                        <option value="paper-yellow">Yellow (Legal Pad)</option>
                        <option value="paper-black">Dark Mode (Black)</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelNotebook">Cancel</button>
                <button id="btnConfirmNotebook">Create</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
